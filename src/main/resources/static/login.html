<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Smart Home — Login</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg: #060918;
      --card: rgba(255,255,255,0.04);
      --card-border: rgba(255,255,255,0.09);
      --accent: #4f8aff;
      --accent2: #a78bfa;
      --accent-glow: rgba(79,138,255,0.35);
      --text: #f1f5ff;
      --muted: #8892aa;
      --input-bg: rgba(255,255,255,0.05);
      --input-border: rgba(255,255,255,0.1);
      --input-focus: rgba(79,138,255,0.5);
      --error: #ff6b6b;
      --success: #4ade80;
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* ── BACKGROUND ── */
    .bg-mesh {
      position: fixed; inset: 0; z-index: 0;
      background:
        radial-gradient(ellipse 80% 60% at 20% 10%, rgba(79,138,255,0.18) 0%, transparent 60%),
        radial-gradient(ellipse 60% 50% at 80% 80%, rgba(167,139,250,0.15) 0%, transparent 60%),
        radial-gradient(ellipse 40% 40% at 50% 50%, rgba(79,138,255,0.06) 0%, transparent 70%);
    }

    .bg-grid {
      position: fixed; inset: 0; z-index: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
      background-size: 48px 48px;
      mask-image: radial-gradient(ellipse 80% 80% at 50% 50%, black 30%, transparent 100%);
    }

    /* Floating orbs */
    .orb {
      position: fixed; border-radius: 50%; filter: blur(80px);
      animation: drift 12s ease-in-out infinite alternate;
      z-index: 0; pointer-events: none;
    }
    .orb-1 { width: 400px; height: 400px; background: rgba(79,138,255,0.12); top: -100px; left: -100px; animation-delay: 0s; }
    .orb-2 { width: 300px; height: 300px; background: rgba(167,139,250,0.1); bottom: -80px; right: -80px; animation-delay: -4s; }
    .orb-3 { width: 200px; height: 200px; background: rgba(79,138,255,0.08); top: 50%; left: 60%; animation-delay: -8s; }

    @keyframes drift {
      from { transform: translate(0, 0) scale(1); }
      to   { transform: translate(30px, 20px) scale(1.05); }
    }

    /* ── CARD ── */
    .card-wrap {
      position: relative; z-index: 10;
      width: 100%; max-width: 420px;
      padding: 20px;
      animation: fadeUp 0.7s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(32px) scale(0.97); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    .card {
      background: var(--card);
      border: 1px solid var(--card-border);
      border-radius: 24px;
      padding: 44px 40px 36px;
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      box-shadow:
        0 0 0 1px rgba(255,255,255,0.04) inset,
        0 32px 80px rgba(0,0,0,0.5),
        0 0 60px rgba(79,138,255,0.06);
      position: relative;
      overflow: hidden;
    }

    /* Card shimmer top edge */
    .card::before {
      content: '';
      position: absolute; top: 0; left: 20%; right: 20%; height: 1px;
      background: linear-gradient(90deg, transparent, rgba(79,138,255,0.6), rgba(167,139,250,0.6), transparent);
    }

    /* ── HEADER ── */
    .logo {
      display: flex; align-items: center; gap: 12px;
      margin-bottom: 28px;
    }

    .logo-icon {
      width: 44px; height: 44px; border-radius: 12px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      display: flex; align-items: center; justify-content: center;
      font-size: 20px;
      box-shadow: 0 8px 24px var(--accent-glow);
    }

    .logo-text { line-height: 1.2; }
    .logo-text .name { font-size: 17px; font-weight: 700; color: var(--text); letter-spacing: -0.3px; }
    .logo-text .tagline { font-size: 11px; color: var(--muted); font-weight: 400; letter-spacing: 0.5px; text-transform: uppercase; }

    .card-title {
      font-size: 26px; font-weight: 700; color: var(--text);
      letter-spacing: -0.6px; margin-bottom: 6px;
    }

    .card-sub {
      font-size: 14px; color: var(--muted); margin-bottom: 32px; font-weight: 400;
    }

    /* ── FORM ── */
    .field { margin-bottom: 18px; }

    .field label {
      display: block; font-size: 12px; font-weight: 600;
      color: var(--muted); letter-spacing: 0.6px;
      text-transform: uppercase; margin-bottom: 8px;
    }

    .input-wrap {
      position: relative; display: flex; align-items: center;
    }

    .input-icon {
      position: absolute; left: 14px;
      color: var(--muted); font-size: 15px;
      pointer-events: none; transition: color 0.2s;
      display: flex; align-items: center;
    }

    .input-wrap input {
      width: 100%;
      padding: 12px 14px 12px 42px;
      background: var(--input-bg);
      border: 1px solid var(--input-border);
      border-radius: 12px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 14px; font-weight: 400;
      outline: none;
      transition: border-color 0.2s, background 0.2s, box-shadow 0.2s;
      -webkit-text-fill-color: var(--text);
    }

    .input-wrap input::placeholder { color: rgba(136,146,170,0.5); }

    .input-wrap input:focus {
      border-color: var(--accent);
      background: rgba(79,138,255,0.06);
      box-shadow: 0 0 0 3px var(--accent-glow);
    }

    .input-wrap input:focus ~ .input-icon,
    .input-wrap:focus-within .input-icon { color: var(--accent); }

    /* Password toggle */
    .pw-toggle {
      position: absolute; right: 14px;
      background: none; border: none; cursor: pointer;
      color: var(--muted); font-size: 15px;
      display: flex; align-items: center;
      transition: color 0.2s; padding: 4px;
    }
    .pw-toggle:hover { color: var(--text); }

    /* ── ROW: remember + forgot ── */
    .row-meta {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 28px; margin-top: -4px;
    }

    .remember {
      display: flex; align-items: center; gap: 8px; cursor: pointer;
    }

    .remember input[type="checkbox"] { display: none; }

    .check-box {
      width: 16px; height: 16px; border-radius: 4px;
      border: 1.5px solid var(--input-border);
      background: var(--input-bg);
      display: flex; align-items: center; justify-content: center;
      transition: all 0.2s; flex-shrink: 0;
    }

    .remember input:checked + .check-box {
      background: var(--accent);
      border-color: var(--accent);
      box-shadow: 0 0 10px var(--accent-glow);
    }

    .check-mark {
      color: white; font-size: 10px; font-weight: 700;
      opacity: 0; transform: scale(0.5);
      transition: all 0.15s;
    }

    .remember input:checked + .check-box .check-mark {
      opacity: 1; transform: scale(1);
    }

    .remember-label { font-size: 13px; color: var(--muted); user-select: none; }

    .forgot {
      font-size: 13px; color: var(--accent);
      text-decoration: none; font-weight: 500;
      transition: opacity 0.2s;
    }
    .forgot:hover { opacity: 0.7; }

    /* ── ERROR ── */
    .error-msg {
      display: flex; align-items: center; gap: 8px;
      background: rgba(255,107,107,0.1);
      border: 1px solid rgba(255,107,107,0.25);
      border-radius: 10px; padding: 10px 14px;
      margin-bottom: 20px;
      color: var(--error); font-size: 13px; font-weight: 500;
      opacity: 0; transform: translateY(-6px);
      transition: all 0.3s; pointer-events: none;
    }
    .error-msg.show {
      opacity: 1; transform: translateY(0); pointer-events: auto;
    }

    /* ── BUTTON ── */
    .btn-login {
      width: 100%; padding: 13px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border: none; border-radius: 12px;
      color: white; font-family: 'DM Sans', sans-serif;
      font-size: 15px; font-weight: 600; letter-spacing: -0.2px;
      cursor: pointer; position: relative; overflow: hidden;
      transition: transform 0.15s, box-shadow 0.15s;
      box-shadow: 0 8px 24px var(--accent-glow);
    }

    .btn-login::before {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.15), transparent);
      opacity: 0; transition: opacity 0.2s;
    }

    .btn-login:hover { transform: translateY(-1px); box-shadow: 0 12px 32px var(--accent-glow); }
    .btn-login:hover::before { opacity: 1; }
    .btn-login:active { transform: translateY(1px); }

    .btn-login.loading {
      pointer-events: none; opacity: 0.8;
    }

    .btn-text { transition: opacity 0.2s; }
    .btn-spinner {
      position: absolute; inset: 0; display: flex;
      align-items: center; justify-content: center;
      opacity: 0; transition: opacity 0.2s;
    }
    .btn-login.loading .btn-text { opacity: 0; }
    .btn-login.loading .btn-spinner { opacity: 1; }

    .spinner {
      width: 18px; height: 18px; border: 2px solid rgba(255,255,255,0.3);
      border-top-color: white; border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── DIVIDER ── */
    .divider {
      display: flex; align-items: center; gap: 12px;
      margin: 24px 0; color: var(--muted); font-size: 12px;
    }
    .divider::before, .divider::after {
      content: ''; flex: 1; height: 1px;
      background: var(--input-border);
    }

    /* ── FOOTER ── */
    .signup-row {
      text-align: center; font-size: 13px; color: var(--muted);
      margin-top: 20px;
    }
    .signup-row a {
      color: var(--accent); font-weight: 600;
      text-decoration: none; transition: opacity 0.2s;
    }
    .signup-row a:hover { opacity: 0.7; }

    /* Credentials hint */
    .hint {
      margin-top: 20px;
      background: rgba(79,138,255,0.07);
      border: 1px solid rgba(79,138,255,0.15);
      border-radius: 10px; padding: 10px 14px;
      font-size: 12px; color: var(--muted);
      font-family: 'DM Mono', monospace;
      text-align: center; line-height: 1.7;
    }
    .hint span { color: var(--accent); }

    /* ── RESPONSIVE ── */
    @media (max-width: 480px) {
      .card { padding: 36px 24px 28px; }
      .card-title { font-size: 22px; }
    }
  </style>
</head>
<body>

  <div class="bg-mesh"></div>
  <div class="bg-grid"></div>
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>

  <div class="card-wrap">
    <div class="card">

      <!-- Logo -->
      <div class="logo">
        <div class="logo-icon">🏠</div>
        <div class="logo-text">
          <div class="name">Smart Home</div>
          <div class="tagline">Automation System</div>
        </div>
      </div>

      <div class="card-title">Welcome back</div>
      <div class="card-sub">Sign in to manage your devices</div>

      <!-- Error -->
      <div class="error-msg" id="errorMsg">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
        <span id="errorText">Invalid username or password</span>
      </div>

      <!-- Username -->
      <div class="field">
        <label>Username</label>
        <div class="input-wrap">
          <span class="input-icon">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
          </span>
          <input type="text" id="username" placeholder="Enter your username" autocomplete="username"/>
        </div>
      </div>

      <!-- Password -->
      <div class="field">
        <label>Password</label>
        <div class="input-wrap">
          <span class="input-icon">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
          </span>
          <input type="password" id="password" placeholder="Enter your password" autocomplete="current-password"/>
          <button class="pw-toggle" onclick="togglePw()" type="button" id="pwBtn">
            <svg id="eyeIcon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
      </div>

      <!-- Remember + Forgot -->
      <div class="row-meta">
        <label class="remember">
          <input type="checkbox" id="rememberMe"/>
          <div class="check-box"><span class="check-mark">✓</span></div>
          <span class="remember-label">Remember me</span>
        </label>
        <a href="#" class="forgot" onclick="forgotPw(event)">Forgot password?</a>
      </div>

      <!-- Button -->
      <button class="btn-login" id="loginBtn" onclick="login()">
        <span class="btn-text">Sign In</span>
        <span class="btn-spinner"><div class="spinner"></div></span>
      </button>

      <div class="divider">or</div>

      <div class="signup-row">
        Don't have an account? <a href="#">Sign Up</a>
      </div>

      <!-- Hint -->
      <div class="hint">
        Demo credentials &nbsp;·&nbsp;
        user: <span>admin</span> &nbsp;·&nbsp;
        pass: <span>smarthome123</span>
      </div>

    </div>
  </div>

  <script>
    // Enter key support
    document.getElementById('username').addEventListener('keydown', e => { if(e.key === 'Enter') document.getElementById('password').focus(); });
    document.getElementById('password').addEventListener('keydown', e => { if(e.key === 'Enter') login(); });

    function togglePw() {
      const input = document.getElementById('password');
      const icon = document.getElementById('eyeIcon');
      if (input.type === 'password') {
        input.type = 'text';
        icon.innerHTML = '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>';
      } else {
        input.type = 'password';
        icon.innerHTML = '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>';
      }
    }

    function showError(msg) {
      const el = document.getElementById('errorMsg');
      document.getElementById('errorText').textContent = msg;
      el.classList.add('show');
      document.getElementById('username').style.borderColor = 'rgba(255,107,107,0.5)';
      document.getElementById('password').style.borderColor = 'rgba(255,107,107,0.5)';
    }

    function hideError() {
      document.getElementById('errorMsg').classList.remove('show');
      document.getElementById('username').style.borderColor = '';
      document.getElementById('password').style.borderColor = '';
    }

    async function login() {
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;
      const btn = document.getElementById('loginBtn');

      hideError();

      if (!username || !password) {
        showError('Please fill in all fields');
        return;
      }

      // Loading state
      btn.classList.add('loading');

      try {
        const res = await fetch('http://localhost:8080/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });

        if (res.ok) {
          btn.style.background = 'linear-gradient(135deg, #4ade80, #22c55e)';
          btn.querySelector('.btn-text').textContent = '✓ Success';
          btn.classList.remove('loading');
          setTimeout(() => { window.location.href = '/index.html'; }, 800);
        } else {
          btn.classList.remove('loading');
          showError('Invalid username or password');
          // Shake animation
          btn.style.animation = 'none';
          document.querySelector('.card').style.animation = 'shake 0.4s ease';
          setTimeout(() => { document.querySelector('.card').style.animation = ''; }, 400);
        }
      } catch(e) {
        btn.classList.remove('loading');
        showError('Cannot connect to server. Is it running?');
      }
    }

    function forgotPw(e) {
      e.preventDefault();
      const hint = document.querySelector('.hint');
      hint.style.background = 'rgba(167,139,250,0.12)';
      hint.style.borderColor = 'rgba(167,139,250,0.3)';
      setTimeout(() => {
        hint.style.background = '';
        hint.style.borderColor = '';
      }, 1500);
    }
  </script>

  <style>
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20% { transform: translateX(-6px); }
      40% { transform: translateX(6px); }
      60% { transform: translateX(-4px); }
      80% { transform: translateX(4px); }
    }
  </style>
</body>
</html>
